# alembic.ini — Alembic migration configuration
# Alembic reads this file every time you run an `alembic` command.

[alembic]
# This is intentionally left without a hardcoded URL.
# The actual URL is loaded from your .env file inside migrations/env.py
script_location = migrations

# Template used to generate new migration files
file_template = %%(rev)s_%%(slug)s

# Timezone for timestamps in migration files
timezone = UTC

# Max length of the auto-generated slug part of migration filenames
truncate_slug_length = 40

# Output encoding
output_encoding = utf-8

[post_write_hooks]
# Leave blank — no post-write hooks needed

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
